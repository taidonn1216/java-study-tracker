<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject.name} + ' - タスク一覧'">タスク一覧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1em;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #764ba2;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .add-task-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
        }
        
        .add-task-form h2 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .form-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .tasks-list {
            list-style: none;
        }
        
        .task-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            border-color: #667eea;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .task-item.completed {
            background: #f8f9fa;
            opacity: 0.8;
        }
        
        .task-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .task-status {
            font-size: 1.5em;
        }
        
        .task-title {
            font-size: 1.1em;
            color: #333;
        }
        
        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #6c757d;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .stats-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        
        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 科目一覧に戻る</a>
        
        <h1 th:text="${subject.name}">科目名</h1>
        
        <!-- タスク統計サマリー -->
        <div class="stats-summary" th:if="${totalTasks > 0}">
            <div class="stat-box">
                <h3 th:text="${totalTasks}">0</h3>
                <p>総タスク数</p>
            </div>
            <div class="stat-box">
                <h3 th:text="${completedTasks}">0</h3>
                <p>完了したタスク</p>
            </div>
            <div class="stat-box">
                <h3 th:text="${incompleteTasks}">0</h3>
                <p>未完了タスク</p>
            </div>
        </div>
        
        <!-- タスク登録フォーム -->
        <div class="add-task-form">
            <h2>新しいタスクを追加</h2>
            <form th:action="@{/subjects/{id}/tasks(id=${subject.id})}" method="post">
                <div class="form-group">
                    <input type="text" name="title" placeholder="タスク名を入力してください (例: 第3章を読む)" required>
                    <button type="submit" class="btn btn-primary">追加</button>
                </div>
            </form>
        </div>
        
        <!-- タスク一覧 -->
        <div th:if="${#lists.isEmpty(tasks)}" class="empty-state">
            <p>📋 まだタスクが登録されていません</p>
            <p>上のフォームから最初のタスクを追加してください</p>
        </div>
        
        <ul class="tasks-list" th:if="${!#lists.isEmpty(tasks)}">
            <li class="task-item" th:each="task : ${tasks}" 
                th:classappend="${task.completed} ? 'completed' : ''">
                <div class="task-content">
                    <span class="task-status" th:text="${task.completed} ? '✅' : '⬜'">⬜</span>
                    <span class="task-title" th:text="${task.title}">タスク名</span>
                </div>
                
                <div class="task-actions">
                    <!-- 完了/未完了トグルボタン -->
                    <form th:action="@{/tasks/{taskId}/complete(taskId=${task.id})}" method="post">
                        <input type="hidden" name="subjectId" th:value="${subject.id}">
                        <input type="hidden" name="completed" th:value="${!task.completed}">
                        <button type="submit" class="btn" 
                                th:classappend="${task.completed} ? 'btn-secondary' : 'btn-success'"
                                th:text="${task.completed} ? '未完了に戻す' : '完了にする'">
                            完了にする
                        </button>
                    </form>
                    
                    <!-- 削除ボタン -->
                    <form th:action="@{/tasks/{taskId}/delete(taskId=${task.id})}" method="post"
                          onsubmit="return confirm('このタスクを削除しますか?');">
                        <input type="hidden" name="subjectId" th:value="${subject.id}">
                        <button type="submit" class="btn btn-danger">削除</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
