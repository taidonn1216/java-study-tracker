<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject.name} + ' - タスク一覧'">タスク一覧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1em;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #764ba2;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .add-task-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
        }
        
        .add-task-form h2 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .form-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .btn-warning:hover {
            background: #e0a800;
        }
        
        .task-status-label {
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .tasks-list {
            list-style: none;
        }
        
        .task-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            border-color: #667eea;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .task-item.completed {
            background: #f8f9fa;
            opacity: 0.8;
        }
        
        .task-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .task-status {
            font-size: 1.5em;
        }
        
        .task-title {
            font-size: 1.1em;
            color: #333;
        }
        
        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #6c757d;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
        }
        
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .stats-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        
        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        
        .task-reflection-details {
            margin-top: 10px;
            width: 100%;
            font-size: 0.9em;
            color: #555;
}

        .task-reflection-details summary {
            cursor: pointer;
            color: #667eea;
            font-weight: bold;
            outline: none;
            list-style: none; 
        }

        .task-reflection-details summary:hover {
            text-decoration: underline;
        }

        .reflection-content {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap; 
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- ナビゲーション-->
        <a href="/" class="back-link">← 科目一覧に戻る</a>
        <h1 th:text="${subject.name}">科目名</h1>

        <!-- タスクエラーメッセージ -->
        <div th:if="${errorMessage}"
             style="margin-bottom: 20px; padding: 12px; border-radius: 6px; background: #f8d7da; color: #842029; font-weight: bold;">
            <span th:text="${errorMessage}">エラーメッセージ</span>
        </div>
        
        <!-- タスク統計サマリー -->
        <div class="stats-summary" th:if="${totalTasks > 0}">
            <div class="stat-box">
                <h3 th:text="${totalTasks}">0</h3>
                <p>総タスク数</p>
            </div>
            <div class="stat-box">
                <h3 th:text="${completedTasks}">0</h3>
                <p>完了したタスク</p>
            </div>
            <div class="stat-box">
                <h3 th:text="${incompleteTasks}">0</h3>
                <p>未完了タスク</p>
            </div>
        </div>
        
        <!-- タスク登録フォーム -->
        <div class="add-task-form">
            <h2>新しいタスクを追加</h2>
            <form th:action="@{/subjects/{id}/tasks(id=${subject.id})}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <input type="text" name="title" placeholder="タスク名を入力してください (例: 第3章を読む)" required>
                        <select name="status">
                            <option value="NOT_STARTED">未着手</option>
                            <option value="IN_PROGRESS" selected>進行中</option>
                            <option value="DONE">完了</option>
                        </select>
                        <input type="date" name="deadline" required>
                        <button type="submit" class="btn btn-primary">追加</button>
                    </div>
                    
                <div style="margin-top: 10px;">
                    <textarea name="reflection" placeholder="振り返りを記入してください" 
                              style="width: 100%; height: 60px; padding: 10px; border-radius: 6px; border: 2px solid #dee2e6; font-family: inherit;"></textarea>
                </div>    
            </form>
        </div>
               
        <!-- 絞り込み -->
         <div style="margin: 20px 0; display: flex; justify-content: flex-end;">
            <form th:action="@{/subjects/{id}(id=${subject.id})}" method="get" style="display: flex; align-items: center; gap: 10px;">
                   <label for="statusFilter" style="font-weight: bold; color: #495057;">絞り込み:</label>
                <select id="statusFilter" name="statusFilter" class="form-select" 
                         style="width: auto; padding: 6px 30px 6px 12px; font-weight: bold;" 
                        th:styleappend="${statusFilter == 'DONE'} ? 'color: #28a745;' : (${statusFilter == 'IN_PROGRESS'} ? 'color: #ffc107;' : (${statusFilter == 'NOT_STARTED'} ? 'color: #6c757d;' : 'color: #495057;'))"
                        onchange="this.form.submit()">
                    <option value="" th:selected="${statusFilter == null || statusFilter == ''}">すべて表示</option>
                    <option value="NOT_STARTED" th:selected="${statusFilter == 'NOT_STARTED'}">未着手</option>
                    <option value="IN_PROGRESS" th:selected="${statusFilter == 'IN_PROGRESS'}">進行中</option>
                    <option value="DONE" th:selected="${statusFilter == 'DONE'}">完了</option>
                </select>

                <!-- 期限の並び替え-->
                 <label for="sortOrder" style="font-weight: bold; color: #495057; margin-left: 15px;">並び替え:</label>
                 <select id="sortOrder" name="sortOrder" class="form-select" onchange="this.form.submit()">
                    <option value="idAsc" th:selected="${sortOrder == null || sortOrder == 'idAsc'}">登録が古い順</option>
                    <option value="idDesc" th:selected="${sortOrder == 'idDesc'}">登録が新しい順</option>
                    <option value="deadlineDesc" th:selected="${sortOrder == 'deadlineDesc'}">期限が遠い順</option>
                    <option value="deadlineAsc" th:selected="${sortOrder == 'deadlineAsc'}">期限が近い順</option>
                </select>
            </form>
        </div>

        <!-- タスク一覧 -->
        <div th:if="${#lists.isEmpty(tasks)}" class="empty-state">
            <p>📋 まだタスクが登録されていません</p>
            <p>上のフォームから最初のタスクを追加してください</p>
        </div>
        
        <ul class="tasks-list" th:if="${!#lists.isEmpty(tasks)}">
            <li class="task-item" th:each="task : ${tasks}" th:classappend="${task.completed} ? 'completed' : ''">
               
                <!-- タスク情報 -->
                <div class="task-info-group" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <div class="task-content">
                        <span class="task-status" th:text="${task.status.name() == 'DONE'} ? '✅' : (${task.status.name() == 'IN_PROGRESS'} ? '🔄' : '⬜')">⬜</span>
                        <span class="task-title" th:text="${task.title}" style="font-weight: bold;">タスク名</span>
                        <span class="task-deadline" th:if="${task.deadline != null}" th:text="${#temporals.format(task.deadline, 'yyyy/MM/dd')}">2026/02/26</span>
                        <span class="task-status-label" 
                            th:text="|[${task.status.getLabel()}]|"
                            th:style="${task.status.name() == 'DONE'} ? 'color: #28a745;' : (${task.status.name() == 'IN_PROGRESS'} ? 'color: #ffc107;' : 'color: #6c757d;')">[未着手]</span>
                    </div>
                    
                    <!-- タスク振り返り -->
                    <details class="task-reflection-details" style="margin-top: 8px;">
                        <summary style="cursor: pointer; color: #667eea; font-size: 0.9em;">💬 振り返りを編集・保存</summary>
                        <div class="reflection-content" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 5px; border-left: 4px solid #667eea;">
                            <form th:action="@{/tasks/{taskId}/reflection(taskId=${task.id})}" method="post">
                                <input type="hidden" name="subjectId" th:value="${subject.id}">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <textarea name="reflection" 
                                        style="width: 100%; min-height: 80px; padding: 10px; border: 1px solid #dee2e6; border-radius: 4px; font-family: inherit; resize: vertical;"
                                        placeholder="振り返りを記入してください"
                                        th:text="${task.reflection}"></textarea>
                                <div style="text-align: right; margin-top: 8px;">
                                    <button type="submit" class="btn btn-primary" style="padding: 5px 15px; font-size: 0.8em;">保存する</button>
                                </div>
                            </form>
                        </div>
                    </details>
                </div>
                
                <!-- タスク操作ボタン -->
                <div class="task-actions" style="display: flex; gap: 10px; align-items: center; margin-left: 20px; flex-shrink: 0;">
                    
                    <!-- ステータス変更 -->
                    <form th:action="@{/tasks/{taskId}/status(taskId=${task.id})}" method="post" style="margin: 0;">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="subjectId" th:value="${subject.id}">
                        <select name="status" 
                        onchange="this.form.submit()"
                        th:style="${task.status.name() == 'DONE'} ? 'color: #28a745; font-weight: bold;' : (${task.status.name() == 'IN_PROGRESS'} ? 'color: #ffc107; font-weight: bold;' : 'color: #6c757d; font-weight: bold;')">
                            <option value="NOT_STARTED" th:selected="${task.status.name() == 'NOT_STARTED'}">未着手</option>
                            <option value="IN_PROGRESS" th:selected="${task.status.name() == 'IN_PROGRESS'}">進行中</option>
                            <option value="DONE" th:selected="${task.status.name() == 'DONE'}">完了</option>
                        </select>
                    </form>
                    
                    <!-- 削除 -->
                    <form th:action="@{/tasks/{taskId}/delete(taskId=${task.id})}" method="post"
                        onsubmit="return confirm('このタスクを削除しますか?');" style="margin: 0;">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="subjectId" th:value="${subject.id}">
                        <button type="submit" class="btn btn-danger">削除</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
