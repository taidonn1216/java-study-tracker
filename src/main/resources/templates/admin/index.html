<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>ユーザー管理画面</title>
</head>

<body>
    <!-- ログアウト -->
    <div style="display: flex; justify-content: flex-end;">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">ログアウト</button>
        </form>
    </div>


    <h1>ユーザー管理画面</h1>

    <p th:if="${errorMessage != null}" th:text="${errorMessage}" style="color: red;"></p>
         
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>ユーザー名</th>
                <th>権限</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <!-- 現在 GENERAL 場合 : ADMIN に昇格するボタン -->
                    <form th:if="${user.role == 'GENERAL'}" th:action="@{/admin/users/{id}/role(id=${user.id})}"
                        method="post">
                        <input type="hidden" name="role" value="ADMIN" />
                        <button type="submit">ADMIN に昇格</button>
                    </form>

                    <!-- 現在 ADMIN の場合 : GENERAL に変更するボタン -->
                    <form th:if="${user.role == 'ADMIN'}" th:action="@{/admin/users/{id}/role(id=${user.id})}"
                        method="post">
                        <input type="hidden" name="role" value="GENERAL" />
                        <button type="submit">GENERAL に変更</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <h2>学習状況一覧</h2>
    
    <table border="1">
        <thead>
            <tr>
                <th>ユーザー名</th>
                <th>完了タスク</th>
                <th>未完了タスク</th>
                <th>最終ログイン日時</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${userProgress}">
                <td th:text="${p.username}"></td>
                <td th:text="${p.completedCount}"></td>
                <td th:text="${p.incompletedCount}"></td>
                <td th:text="${p.lastLoginAt != null
                                ?#temporals.format(p.lastLoginAt, 'yyyy/MM/dd HH:mm')
                                :'未ログイン'}"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
